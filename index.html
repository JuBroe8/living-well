<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Living Well — Wissensdatenbank</title>
<link rel="stylesheet" href="src/styles/tokens.css">
<link rel="stylesheet" href="src/styles/components.css">
<link rel="stylesheet" href="src/styles/responsive.css">
</head>
<body>

<div class="hdr"><div class="hdr-in">
  <div>
    <div class="kicker">Buchprojekt · Redaktion</div>
    <div class="logo">Living Well</div>
    <div class="tagline">Personen · Pilotband · Material</div>
  </div>
  <div class="hstats" id="hstats" style="color:#555;font-size:12px">Lädt…</div>
</div></div>

<nav class="tabs" aria-label="Hauptnavigation"><div class="tabs-in">
  <button class="tab on" data-tab="status" data-short="Heute" aria-label="Heute" onclick="goTab('status')">Heute</button>
  <button class="tab" data-tab="persons" data-short="Personen" aria-label="Personen" onclick="goTab('persons')">Personen</button>
  <button class="tab" data-tab="pilot" data-short="Pilot" aria-label="Pilotband" onclick="goTab('pilot')">Pilotband</button>
  <button class="tab" data-tab="layout" data-short="Seiten" aria-label="Seiten" onclick="goTab('layout')">Seiten</button>
  <div class="more-wrap tab-more">
    <button class="tab" id="more-tab" data-tab="more" aria-haspopup="true" aria-expanded="false" onclick="toggleMoreMenu(event)">Mehr</button>
    <div class="more-menu" id="more-menu">
      <button data-tab="entries" onclick="goTab('entries')">Material</button>
      <button data-tab="places" onclick="goTab('places')">Orte</button>
      <button data-tab="kosten" onclick="goTab('kosten')">KI-Kosten</button>
    </div>
  </div>
  <button class="tab tab-add" data-tab="add" data-short="+ Name" aria-label="+ Name" onclick="openCapture()">+ Name</button>
  <div class="tab-sep" id="tab-sep"></div>
  <div class="back-btn" id="back-btn" onclick="backToPersons()">
    <span class="back-arrow">←</span> Zurück zur Übersicht
  </div>
</div></nav>

<div class="bar" id="bar"><div class="bar-in">
  <div class="srch-wrap">
    <span class="srch-ico">⌕</span>
    <input class="srch" id="srch" placeholder="Suchen — Name, Stichwort, Zitat…" oninput="render()">
  </div>
  <div id="chips"></div>
  <select id="person-sort" class="ai ai-sel" style="display:none" aria-label="Sortierung" onchange="setPersonSort(this.value)">
    <option value="next">Nächste Aufgabe</option>
    <option value="updated">Zuletzt bearbeitet</option>
    <option value="dossier">Dossier am weitesten</option>
    <option value="entries">Meiste Einträge</option>
    <option value="name">Name A–Z</option>
  </select>
  <div class="cnt" id="cnt"></div>
</div></div>

<div class="main" id="main">
  <div class="empty"><div class="empty-ico">○</div>Wird geladen…</div>
</div>

<script type="module" src="src/app.js"></script>
</body>
</html>
