<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Living Well — Wissensdatenbank</title>
<style>
:root {
  --bg:  #f7f5f1;
  --bg2: #f0ede8;
  --wh:  #ffffff;
  --br:  #e2ddd7;
  --br2: #c8c4be;
  --tx:  #141414;
  --t2:  #4a4a4a;
  --t3:  #8a8a8a;
  --gn:  #2d6a4f;
  --am:  #9a7200;
  --serif: Georgia, 'Times New Roman', serif;
  --sans:  -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
  --r: 8px;
  --sh: 0 1px 4px rgba(0,0,0,.07);
}
* { box-sizing: border-box; margin: 0; padding: 0 }
body { font-family: var(--sans); background: var(--bg); color: var(--tx); font-size: 14px; line-height: 1.5 }

/* ── HEADER ── */
.hdr { background: var(--tx); color: var(--bg); padding: 1.5rem 2rem 1.25rem }
.hdr-in { max-width: 1140px; margin: 0 auto; display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; flex-wrap: wrap }
.kicker { font-size: 9px; letter-spacing: .2em; text-transform: uppercase; color: #666; margin-bottom: 5px }
.logo { font-family: var(--serif); font-size: 26px; font-weight: 400; letter-spacing: -.02em; line-height: 1 }
.tagline { font-size: 12px; color: #555; margin-top: 6px }
.hstats { display: flex; gap: 24px; flex-wrap: wrap; padding-top: 2px }
.hstat { text-align: right }
.hstat-n { font-size: 21px; font-weight: 200; color: #d0d0d0; line-height: 1; letter-spacing: -.03em }
.hstat-l { font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: #555; margin-top: 2px }

/* ── TABS ── */
.tabs { background: #1a1a1a; padding: 0 2rem }
.tabs-in { max-width: 1140px; margin: 0 auto; display: flex; align-items: center; overflow-x: auto; scrollbar-width: none }
.tabs-in::-webkit-scrollbar { display: none }
.tab { appearance: none; background: transparent; font-family: inherit; font-size: 11px; letter-spacing: .07em; text-transform: uppercase; padding: 11px 16px; cursor: pointer; color: #777; border: 0; border-bottom: 2px solid transparent; transition: all .15s; user-select: none; white-space: nowrap }
.tab:hover { color: #999 }
.tab.on { color: #e8e8e8; border-bottom-color: #e8e8e8 }
.tab:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible, .pc:focus-visible { outline: 2px solid #b98a1d; outline-offset: 2px }
.tab-add { margin-left: auto; color: #eee; font-weight: 700 }
.tab-sep { width: 1px; background: #333; height: 18px; align-self: center; margin: 0 6px; display: none }
.back-btn { font-size: 11px; color: #555; cursor: pointer; padding: 11px 14px; transition: color .15s; display: none; align-items: center; gap: 6px; letter-spacing: .03em }
.back-btn:hover { color: #ccc }
.back-btn.vis { display: flex }
.back-arrow { font-size: 13px }

/* ── FILTER BAR ── */
.bar { background: var(--wh); border-bottom: 1px solid var(--br); padding: 10px 2rem; position: sticky; top: 0; z-index: 50; box-shadow: 0 2px 8px rgba(0,0,0,.05) }
.bar-in { max-width: 1140px; margin: 0 auto; display: flex; gap: 8px; align-items: center; flex-wrap: wrap }
.srch-wrap { position: relative; flex: 1; min-width: 180px }
.srch-ico { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: #aaa; font-size: 12px; pointer-events: none }
.srch { width: 100%; padding: 7px 14px 7px 30px; border: 1px solid var(--br2); border-radius: 20px; font-size: 13px; background: var(--bg); outline: none; color: var(--tx); transition: border .15s }
.srch:focus { border-color: var(--tx); background: var(--wh) }
.chip { font-size: 11px; padding: 4px 11px; border: 1px solid var(--br2); border-radius: 20px; background: transparent; cursor: pointer; color: var(--t2); transition: all .12s; white-space: nowrap; user-select: none }
.chip:hover { border-color: #999; color: var(--tx) }
.chip.on { background: var(--tx); color: var(--bg); border-color: var(--tx) }
.cnt { font-size: 12px; color: var(--t3); margin-left: auto; white-space: nowrap }

/* ── CHIP GROUPS ── */
#chips { display: flex; flex-direction: column; gap: 6px; flex: 1 1 100%; min-width: 0; margin-top: 6px }
.chip-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; min-width: 0 }
.chip-group-lbl { font-size: 9px; text-transform: uppercase; letter-spacing: .12em; color: var(--t3); font-weight: 700; white-space: nowrap }
.chip-row { display: flex; gap: 5px; flex-wrap: wrap; min-width: 0 }

/* ── MAIN ── */
.main { max-width: 1140px; margin: 0 auto; padding: 1.5rem 2rem 5rem }

/* ── PILOTBAND ── */
.pilot-hero { background: #171715; color: #f6f1e8; border-radius: 12px; padding: 22px 24px; margin-bottom: 12px }
.pilot-kicker { font-size: 9px; letter-spacing: .18em; text-transform: uppercase; color: #9d998f; margin-bottom: 10px }
.pilot-title { font-family: var(--serif); font-size: clamp(23px, 3vw, 32px); font-weight: 400; line-height: 1.1; letter-spacing: -.02em; max-width: 700px }
.pilot-thesis { font-family: var(--serif); font-size: 15px; line-height: 1.6; max-width: 780px; color: #d8d2c7; margin-top: 12px }
.pilot-note { color: #8e887e; font-size: 12px; margin-top: 10px }
.pilot-board { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 8px; align-items: start }
.pilot-col { background: #eeebe5; border: 1px solid var(--br); border-radius: var(--r); padding: 10px; min-height: 190px }
.pilot-col-hd { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 9px; font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--t3); font-weight: 700 }
.candidate-card { width: 100%; text-align: left; font-family: inherit; background: var(--wh); border: 1px solid var(--br); border-radius: 7px; padding: 11px 12px; margin-bottom: 6px; cursor: pointer; color: var(--tx) }
.candidate-card:hover { border-color: #aaa; box-shadow: var(--sh) }
.candidate-name { font-size: 13px; font-weight: 700 }
.candidate-meta { font-size: 11px; color: var(--t3); margin-top: 3px; line-height: 1.45 }
.fit-pill { display: inline-flex; margin-top: 7px; font-size: 10px; border-radius: 20px; padding: 3px 8px; background: var(--bg2); color: var(--t2) }
.fit-pill.strong { background: #eef6f1; color: var(--gn) }
.fit-panel { background: #f5f1e8; border: 1px solid #ded4be; border-radius: var(--r); padding: 14px 16px; margin-bottom: 12px }
.fit-head { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; margin-bottom: 12px }
.fit-head:last-child { margin-bottom: 0 }
.fit-score { font-family: var(--serif); font-size: 22px; white-space: nowrap }
.fit-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 9px }
.fit-field { background: rgba(255,255,255,.65); border: 1px solid #ded4be; border-radius: 6px; padding: 9px 10px }
.fit-field label { display: block; font-size: 10px; line-height: 1.35; color: var(--t2); margin-bottom: 5px }
.fit-field select { width: 100%; border: 1px solid var(--br2); background: #fff; border-radius: 5px; padding: 6px }
.dossier-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 9px }
.dossier-check { font-size: 10px; padding: 3px 8px; border-radius: 20px; background: #eef6f1; color: var(--gn) }
.dossier-check.miss { background: #fdf0ee; color: #a33124 }
.cost-row { display: flex; justify-content: space-between; gap: 12px; border-top: 1px solid var(--br); padding: 9px 0; font-size: 12px }

/* ── PERSON CARDS (grid) ── */
.pgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 6px }
.pc { background: var(--wh); border: 1px solid var(--br); border-radius: var(--r); padding: 14px 16px; cursor: pointer; transition: border-color .12s, box-shadow .12s }
.pc:hover { border-color: #bbb; box-shadow: var(--sh); transform: translateY(-1px) }
.pc-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px }
.pc-name { font-size: 14px; font-weight: 600; line-height: 1.3 }
.sdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px }
.dc { background: var(--gn) }
.dr { background: var(--am) }
.dm { background: #aaa }
.pc-role { font-size: 11px; color: var(--t3); margin-top: 3px; font-style: italic }
.pc-dates { font-size: 11px; color: var(--t3); margin-top: 1px }
.pc-ec { font-size: 10px; color: var(--t3); background: var(--bg2); border: 1px solid var(--br); border-radius: 10px; padding: 2px 8px; margin-top: 9px; display: inline-block }
.pc-ec.has { color: var(--gn); background: #eef6f1; border-color: #b8d8c8 }
.pc-tags { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 8px }
.pc-thumb { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: var(--bg2); border: 1px solid var(--br) }

/* ── PILLS ── */
.pill { font-size: 9px; text-transform: uppercase; letter-spacing: .06em; border-radius: 10px; padding: 2px 8px; border: 1px solid var(--br2); color: var(--t3); white-space: nowrap }
.pill-d { background: var(--gn); border-color: var(--gn); color: #fff }
.pill-h { background: #888; border-color: #888; color: #fff }
.pill-w { background: #fdf0ee; border-color: #e0b0aa; color: #a33124 }
.pill-s { background: #eef6f1; border-color: #b8d8c8; color: var(--gn) }
.pill-q { background: #f5f0e5; border-color: #e8d9a0; color: #7a5800 }
.pill-tag { background: transparent; border-color: var(--br); color: var(--t3); font-size: 8.5px; opacity: .72 }

/* ── EDIT / CURATION CONTROLS ── */
.mini-btn { background: transparent; color: var(--t2); border: 1px solid var(--br2); padding: 6px 11px; border-radius: 6px; font-size: 10px; letter-spacing: .08em; text-transform: uppercase; cursor: pointer; transition: all .15s; font-weight: 600 }
.mini-btn:hover { border-color: #999; color: var(--tx); background: var(--wh) }
.mini-btn.primary { background: var(--tx); color: var(--bg); border-color: var(--tx) }
.mini-btn.danger { color: #c0392b; border-color: #e0b0aa }
.actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap }
.form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px }
.form-grid.one { grid-template-columns: 1fr }
.form-grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)) }
.checkgrid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px }
.checkchip { display: inline-flex; align-items: center; gap: 5px; border: 1px solid var(--br2); background: var(--bg); color: var(--t2); border-radius: 20px; padding: 4px 9px; font-size: 11px; cursor: pointer; user-select: none }
.checkchip input { width: 12px; height: 12px; accent-color: var(--tx) }
.readonly-note { font-size: 11px; color: var(--t3); line-height: 1.6; margin-top: 5px }
.save-msg { font-size: 12px; color: var(--t3); line-height: 1.5 }
.subtle-link { color: var(--t2); text-decoration: underline; text-decoration-color: var(--br2); text-underline-offset: 3px; cursor: pointer }
.subtle-link:hover { color: var(--tx); text-decoration-color: var(--tx) }

/* ── ENHANCE REVIEW ── */
.enhance-panel { background: #fbfaf7; border: 1px solid var(--br); border-left: 3px solid var(--tx); border-radius: var(--r); padding: 18px 20px; margin-bottom: 20px }
.enhance-hd { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; margin-bottom: 14px }
.enhance-title { font-size: 11px; text-transform: uppercase; letter-spacing: .14em; font-weight: 700; color: var(--tx) }
.enhance-sub { font-size: 12px; color: var(--t3); line-height: 1.6; margin-top: 3px }
.enhance-loading { color: var(--t3); font-size: 13px; line-height: 1.7; padding: 16px 0 }
.review-grid { display: grid; gap: 8px }
.review-row { background: var(--wh); border: 1px solid var(--br); border-radius: 6px; padding: 10px 12px; display: grid; grid-template-columns: 26px minmax(120px, 170px) 1fr; gap: 10px; align-items: start }
.review-row input[type="checkbox"] { margin-top: 6px; width: 14px; height: 14px; accent-color: var(--tx) }
.review-label { font-size: 9px; text-transform: uppercase; letter-spacing: .12em; color: var(--t3); font-weight: 700; padding-top: 5px }
.review-current { font-size: 11px; color: var(--t3); line-height: 1.5; margin-bottom: 6px }
.review-entry { background: var(--wh); border: 1px solid var(--br); border-radius: 6px; padding: 12px 14px; display: grid; gap: 10px }
.review-entry-top { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start }
.review-entry-title { font-size: 12px; font-weight: 700; color: var(--tx); line-height: 1.4 }
.review-entry-prev { font-size: 12px; color: var(--t2); line-height: 1.55; font-style: italic; margin-top: 2px }
.review-fields { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px }
.review-field { border-top: 1px solid var(--br); padding-top: 8px }
.review-field label { display: flex; align-items: center; gap: 6px; font-size: 9px; text-transform: uppercase; letter-spacing: .11em; color: var(--t3); font-weight: 700; margin-bottom: 5px }
.review-field input[type="checkbox"] { width: 12px; height: 12px; accent-color: var(--tx) }
.review-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; border-top: 1px solid var(--br); margin-top: 14px; padding-top: 14px }

/* ── PROFILE VIEW ── */
.profile-hd { background: var(--wh); border: 1px solid var(--br); border-radius: var(--r); padding: 18px 20px; margin-bottom: 12px }
.profile-hd-top { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start }
.profile-portrait { width: 72px; height: 72px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: var(--bg2); border: 1px solid var(--br) }
.profile-name { font-family: var(--serif); font-size: 26px; font-weight: 400; letter-spacing: -.02em; line-height: 1.15; margin-bottom: 4px }
.profile-dates-line { font-family: var(--serif); font-size: 14px; color: var(--t3); font-style: italic; letter-spacing: .01em; margin-bottom: 8px }
.profile-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 0 }
.profile-role { font-size: 11px; color: var(--t3); font-style: italic }
.profile-divider { border: none; border-top: 1px solid var(--br); margin: 12px 0 }
.status-badge { font-size: 10px; padding: 3px 10px; border-radius: 10px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase }
.sb-bereit    { background: var(--gn); color: #fff }
.sb-aktiv     { background: var(--am); color: #fff }
.sb-kandidat  { background: #aaa; color: #fff }
.profile-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px }
.profile-tag { font-size: 11px; color: var(--t2); background: var(--bg2); border: 1px solid var(--br); border-radius: 20px; padding: 3px 11px; white-space: nowrap }
.profile-curation { background: var(--wh); border: 1px solid var(--br); border-radius: var(--r); padding: 16px 18px; margin-bottom: 12px }
.curation-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px 20px }
.curation-item.full { grid-column: 1 / -1 }
.curation-val { font-size: 13px; color: var(--t2); line-height: 1.6 }
.curation-val.em { font-family: var(--serif); font-size: 15.5px; color: var(--tx); line-height: 1.55; font-style: italic }
.curation-empty { font-size: 12px; color: var(--t3); font-style: italic }
.profile-edit { background: var(--wh); border: 1px solid var(--br); border-radius: var(--r); padding: 18px 20px; margin-bottom: 12px }

.profile-bio { background: var(--wh); border: 1px solid var(--br); border-radius: var(--r); padding: 18px 20px; margin-bottom: 14px }
.profile-bio-lbl { font-size: 9px; text-transform: uppercase; letter-spacing: .15em; color: var(--t3); font-weight: 600; margin-bottom: 12px }
.profile-bio-text { max-width: 680px }
.bio-kicker { font-family: var(--serif); font-size: 16px; font-style: italic; color: var(--tx); line-height: 1.55; letter-spacing: -.01em; margin-bottom: 1em; font-weight: 400 }
.bio-body { font-family: var(--serif); font-size: 14px; color: var(--t2); line-height: 1.75 }
.bio-body p { margin-bottom: 1em }
.bio-body p:last-child { margin-bottom: 0 }

/* ── PERSON IMAGE GALLERY ── */
.gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; margin-top: 10px }
.gallery-item { position: relative; border-radius: 6px; overflow: hidden; border: 1px solid var(--br); background: var(--bg2); aspect-ratio: 1 }
.gallery-item.is-cover { border-color: var(--gn); box-shadow: 0 0 0 2px rgba(45,106,79,.25) }
.gallery-item img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover }
.gallery-item-actions { position: absolute; left: 0; right: 0; bottom: 0; display: flex; flex-wrap: wrap; gap: 4px; padding: 6px; background: linear-gradient(to top, rgba(0,0,0,.55), transparent) }
.gallery-cover-badge { font-size: 8.5px; text-transform: uppercase; letter-spacing: .06em; font-weight: 700; background: var(--gn); color: #fff; padding: 3px 6px; border-radius: 20px; white-space: nowrap }
.gallery-btn { font-size: 8.5px; text-transform: uppercase; letter-spacing: .04em; font-weight: 600; background: rgba(20,20,20,.75); color: #fff; border: 0; border-radius: 20px; padding: 3px 6px; cursor: pointer; white-space: nowrap }
.gallery-btn:hover { background: rgba(20,20,20,.92) }
.gallery-btn-rm:hover { background: #a33124 }
.gallery-add-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--br) }
.gallery-add-row .ai { flex: 1; min-width: 200px }

.prof-section { margin-bottom: 20px }
.prof-sec-hd { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; padding-bottom: 9px; border-bottom: 2px solid var(--tx) }
.prof-sec-ic { font-size: 14px; color: var(--t2) }
.prof-sec-name { font-size: 11px; text-transform: uppercase; letter-spacing: .12em; font-weight: 700; color: var(--tx) }
.prof-sec-cnt { font-size: 11px; color: var(--t3) }

.no-entries { font-size: 12px; color: var(--t3); font-style: italic; padding: 10px 0 32px; text-align: center }

/* ── ENTRY CARDS ── */
.card { background: var(--wh); border: 1px solid var(--br); border-radius: var(--r); margin-bottom: 6px; transition: border-color .12s, box-shadow .12s }
.card:hover { border-color: #bbb; box-shadow: var(--sh) }
.card.open { border-color: #999 }
.ch { padding: 12px 14px; display: flex; gap: 10px; align-items: flex-start; cursor: pointer }
.ci { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; margin-top: 1px }
.ci-A { background: #e6f0ec; color: var(--gn) }
.ci-Z { background: #f5f0e5; color: #7a5800 }
.ci-F { background: #e7ecf2; color: #2a4a72 }
.ci-S { background: #ece7f2; color: #5a3a7a }
.ci-x { background: var(--bg2); color: var(--t3) }
.cl { flex: 1; min-width: 0 }
.ce-person { font-size: 12px; font-weight: 600; color: var(--t3); margin-bottom: 1px; cursor: pointer }
.ce-person:hover { color: var(--tx); text-decoration: underline }
.ce-prev { font-size: 12px; color: var(--t2); line-height: 1.5; font-style: italic; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical }
.ce-meta { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 7px; align-items: center }
.ce-sep { width: 1px; height: 12px; background: var(--br); align-self: center; margin: 0 4px; flex-shrink: 0 }
.buch-badge { font-size: 9px; padding: 2px 8px; border-radius: 8px; border: 1px solid; white-space: nowrap }
.bb-d { color: var(--gn); border-color: #b8d8c8; background: #eef6f1 }
.bb-h { color: var(--t3); border-color: var(--br2); background: var(--bg2) }
.carr { color: #bbb; font-size: 10px; flex-shrink: 0; padding-top: 4px; transition: transform .2s }
.card.open .carr { transform: rotate(180deg) }

.cd { display: none; border-top: 1px solid var(--br); background: var(--bg) }
.card.open .cd { display: block }
.cd-in { padding: 16px 18px 18px; display: grid; gap: 18px }
.lbl { font-size: 9px; text-transform: uppercase; letter-spacing: .13em; color: var(--t3); margin-bottom: 5px; font-weight: 600 }
.val { font-size: 13px; color: var(--t2); line-height: 1.9 }
.val-fakt { font-size: 12px; color: var(--t3); line-height: 1.7; font-style: italic }
.qt { font-family: var(--serif); font-size: 15px; font-style: italic; border-left: 3px solid var(--tx); padding-left: 16px; color: var(--tx); line-height: 2 }
.src { font-size: 11px; color: var(--t3) }
/* Buchnotiz — editorial callout */
.buchnotiz-block { background: #fdf8ee; border: 1px solid #e8d9a0; border-left: 3px solid var(--am); border-radius: 6px; padding: 12px 14px }
.buchnotiz-lbl { font-size: 9px; text-transform: uppercase; letter-spacing: .13em; color: var(--am); font-weight: 700; margin-bottom: 5px }
.buchnotiz-text { font-size: 12.5px; color: #5a4400; line-height: 1.8; font-style: italic }
.entry-curation { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px 18px; background: var(--wh); border: 1px solid var(--br); border-radius: 6px; padding: 12px 14px }
.entry-curation .full { grid-column: 1 / -1 }
.entry-edit { display: grid; gap: 12px }

function supa(t) {
  return fetch(SB + '/rest/v1/' + t + '?select=*&order=created_at.asc', {
    headers: { 'apikey': SK, 'Authorization': 'Bearer ' + SK }
  }).then(function(r) {
    if (!r.ok) return r.text().then(function(t) { throw new Error(parseSupaErr(t) || 'Fehler beim Laden von ' + t); });

  });

function supaOptional(t) {
  return supa(t).then(function(data) {
    tableAvailability[t] = true;

  }).catch(function(err) {
    tableAvailability[t] = false;
    console.warn('Optionale Tabelle nicht verfügbar:', t, err.message);

    supaOptional('research_jobs'), supaOptional('ai_runs'), supaOptional('person_images')

    p.format_eignung = arr(p.format_eignung);
    return p;
  });
  entries = (entries || []).map(function(x) {
    x.tags = arr(x.tags);
    x.themen = arr(x.themen);
    if (x.staerke !== undefined && x.staerke !== null && x.staerke !== '') x.staerke = Number(x.staerke);
    return x;
  });
  places = places || [];
  books = books || [];
  bookCandidates = bookCandidates || [];
  researchJobs = researchJobs || [];
  aiRuns = aiRuns || [];
}

function updateStats() {
  var pilot = activeBook();

  document.getElementById('hstats').innerHTML =

function stat(n, l) {

// ── NAVIGATION ───────────────────────────────────
function goTab(t) {
  view = t; profilePerson = null; profileEdit = false; fil = {};
  document.querySelectorAll('.tab').forEach(function(x) {
    x.classList.toggle('on', x.dataset.tab === t);
  });
  document.getElementById('back-btn').classList.remove('vis');
  document.getElementById('tab-sep').style.display = 'none';
  document.getElementById('bar').style.display = (t === 'add' || t === 'status' || t === 'pilot' || t === 'kosten') ? 'none' : '';
  document.getElementById('srch').value = '';
  window.scrollTo(0, 0);
  chips(); render();
}

function openCapture() {
  addState = { phase: 'input', person: null, entries: [], prefill: '', job: null, usage: null, mode: 'capture' };
  goTab('add');
}

function showProfile(p) {
  view = 'profile'; profilePerson = p; profileEdit = false; fitPanelExpanded = false;
  document.querySelectorAll('.tab').forEach(function(x) {
    x.classList.toggle('on', x.dataset.tab === 'persons');
  });
  document.getElementById('back-btn').classList.add('vis');
  document.getElementById('tab-sep').style.display = 'block';
  document.getElementById('bar').style.display = 'none';
  render();
}

// ── FILTER CHIPS ─────────────────────────────────
function chips() {
  var el = document.getElementById('chips'); el.innerHTML = '';
  if (view === 'persons') {
    mkGroup(el, 'status', 'Status', ['Alle', 'aktiv', 'kandidat', 'bereit']);
    mkGroup(el, 'cur', 'Material', ['Alle', 'fehlende_these', 'starke_personen', 'ungepruefte_quellen', 'formatbereit', 'buchreif']);
    mkGroup(el, 'format', 'Format', ['Alle'].concat(FORMAT_EIGNUNG));
  }
  if (view === 'entries') {
    mkGroup(el, 'kat', 'Kategorie', ['Alle', 'Anekdote', 'Zitat', 'Fakt', 'Stil']);
    mkGroup(el, 'buch', 'Buch-Status', ['Alle', 'direkt', 'hintergrund']);
    mkGroup(el, 'curEntry', 'Qualität', ['Alle', 'strong_entries', 'unchecked_entries', 'unlinked_entries']);
    mkGroup(el, 'reife', 'Buchreife', ['Alle'].concat(BUCHREIFE));
  }
}
function mkGroup(el, grp, label, vals) {
  var labels = { direkt: 'Direkt', hintergrund: 'Hintergrund', aktiv: 'Aktiv', kandidat: 'Kandidat', bereit: 'Bereit' };
  var group = document.createElement('div'); group.className = 'chip-group';
  var lbl = document.createElement('div'); lbl.className = 'chip-group-lbl'; lbl.textContent = label;
  group.appendChild(lbl);
  var row = document.createElement('div'); row.className = 'chip-row';
  vals.forEach(function(v) {
    var b = document.createElement('button'); b.className = 'chip';
    if ((!fil[grp] && v === 'Alle') || fil[grp] === v) b.className += ' on';
    b.textContent = labels[v] || LABEL[v] || v;
    b.onclick = function() { fil[grp] = v === 'Alle' ? null : v; chips(); render(); };
    row.appendChild(b);
  });
  group.appendChild(row);
  el.appendChild(group);
}

// ── SEARCH ───────────────────────────────────────
function q() { return (document.getElementById('srch').value || '').toLowerCase(); }
function hit(obj, s) {
  if (!s) return true;
  return Object.values(obj).some(function(v) {
    return v && (Array.isArray(v) ? v.join(' ') : String(v)).toLowerCase().indexOf(s) > -1;
  });
}

// ── RENDER ───────────────────────────────────────
function render() {
  var main = document.getElementById('main'), s = q();
  if (view === 'profile')       rProfile(main);
  else if (view === 'persons')  rPersons(main, s);
  else if (view === 'entries')  rEntries(main, s);
  else if (view === 'add')      rAdd(main);
  else if (view === 'status')   rStatus(main);
  else if (view === 'pilot')    rPilot(main);
  else if (view === 'kosten')   rKosten(main);
  else                          rPlaces(main, s);
}

// ── PERSONS ──────────────────────────────────────
function rPersons(main, s) {
  var data = persons.filter(function(p) {
    if (fil.status && p.status !== fil.status) return false;
    if (fil.format && arr(p.format_eignung).indexOf(fil.format) < 0) return false;
    if (fil.cur && !personMatchesCuration(p, fil.cur)) return false;
    return hit(p, s);
  });
  document.getElementById('cnt').textContent = data.length + ' Personen';
  main.innerHTML = '';
  if (!data.length) {
    main.innerHTML = '<div class="empty"><div class="empty-ico">○</div>Keine Personen gefunden.</div>';
    return;
  }
  var grid = document.createElement('div'); grid.className = 'pgrid';
  data.forEach(function(p) { grid.appendChild(mkPCard(p)); });
  main.appendChild(grid);
}

function mkPCard(p) {
  var dc  = p.status === 'bereit' ? 'dc' : p.status === 'aktiv' ? 'dr' : 'dm';
  var ec  = personEntries(p).length;
  var dm  = personDashboardModel(p);
  var dossier = dossierModel(p), candidate = candidateFor(p), fit = fitScore(candidate);
  var pillItems = [];
  arr(p.format_eignung).slice(0, 2).forEach(function(t) { pillItems.push({ cls: 'pill pill-q', text: label(t) }); });
  dm.gaps.slice(0, 2).forEach(function(g) { pillItems.push({ cls: 'pill pill-w', text: g }); });
  (p.tags || []).forEach(function(t) { pillItems.push({ cls: 'pill', text: t }); });
  var MAX_PILLS = 4;
  var shownPills = pillItems.slice(0, MAX_PILLS);
  var hiddenCount = pillItems.length - shownPills.length;
  var tagsHtml = shownPills.map(function(item) { return '<span class="' + item.cls + '">' + esc(item.text) + '</span>'; }).join('') +
    (hiddenCount > 0 ? '<span class="pill">+' + hiddenCount + '</span>' : '');
  var c = document.createElement('div'); c.className = 'pc';
  c.setAttribute('role', 'button');
  c.tabIndex = 0;
  c.innerHTML =
    '<div class="pc-top">' +
      (p.image_url ? '<img class="pc-thumb" src="' + esc(p.image_url) + '" alt="">' : '') +
      '<div style="flex:1;min-width:0">' +
        '<div class="pc-name">' + esc(p.name) + '</div>' +
      '</div>' +
      '<div class="sdot ' + dc + '" title="' + esc(p.status || '') + '"></div>' +
    '</div>' +
    (p.kategorie ? '<div class="pc-role">'  + esc(p.kategorie) + '</div>' : '') +
    (p.dates     ? '<div class="pc-dates">' + esc(p.dates)     + '</div>' : '') +
    '<div class="pc-ec' + (ec > 0 ? ' has' : '') + '">' +
      (ec > 0 ? ec + ' Eintr' + (ec === 1 ? 'ag' : 'äge') : 'Noch kein Material') +
    '</div>' +
    '<div class="dossier-row"><span class="pill ' + (dossier.count >= 6 ? 'pill-s' : 'pill-q') + '">Dossier ' + dossier.count + '/8</span>' + (fit !== null ? '<span class="pill pill-s">Pilot ' + fit + '/12</span>' : '') + '</div>' +
    (tagsHtml ? '<div class="pc-tags">' + tagsHtml + '</div>' : '');
  var open = function() { showProfile(p); };
  c.onclick = open;
  c.onkeydown = function(e) {
    if (e.key === 'Enter' || e.key === ' ' || e.key === 'Spacebar') {
      if (e.key !== 'Enter') e.preventDefault();
      open();
    }
  };
  return c;
}

// ── PERSON IMAGE GALLERY ──────────────────────────
// person_images is the source of truth (many candidates per person);
// persons.image_url is kept as a denormalized cache of the current cover
// so card grids/profile headers can render without a join.
function imagesForPerson(p) {
  return personImages.filter(function(img) { return String(img.person_id) === String(p.id); })
    .sort(function(a, b) { return new Date(a.created_at || 0) - new Date(b.created_at || 0); });
}
function coverImageUrl(p) {
  var imgs = imagesForPerson(p);
  var cover = imgs.find(function(i) { return i.is_cover; });
  return (cover || imgs[0] || {}).url || p.image_url || '';
}

function galleryHtml(p) {
  var imgs = imagesForPerson(p);
  var grid = imgs.map(function(img) {
    return '<div class="gallery-item' + (img.is_cover ? ' is-cover' : '') + '" data-image-id="' + esc(img.id) + '">' +
      '<img src="' + esc(img.url) + '" alt="">' +
      '<div class="gallery-item-actions">' +
        (img.is_cover ? '<span class="gallery-cover-badge">Titelbild</span>' : '<button class="gallery-btn" onclick="setCoverImage(\'' + esc(img.id) + '\')">Als Titelbild</button>') +
        '<button class="gallery-btn gallery-btn-rm" onclick="removePersonImage(\'' + esc(img.id) + '\')" title="Entfernen" aria-label="Entfernen">✕</button>' +
      '</div>' +
    '</div>';
  }).join('');
  return '<div class="profile-gallery">' +
    '<div class="profile-bio-lbl">Bilder' + (imgs.length ? ' (' + imgs.length + ')' : '') + '</div>' +
    (grid ? '<div class="gallery-grid">' + grid + '</div>' : '<div class="readonly-note">Noch keine Bilder — per Datei oder Link hinzufügen.</div>') +
    '<div class="gallery-add-row">' +
      '<input id="gallery-add-url" class="ai" placeholder="https://… Bild-URL einfügen und Enter drücken" onkeydown="if(event.key===\'Enter\'){event.preventDefault();addPersonImageFromUrl()}">' +
      '<button class="mini-btn" onclick="addPersonImageFromUrl()">Hinzufügen</button>' +
      '<label class="mini-btn" style="cursor:pointer">Datei hochladen<input type="file" accept="image/*" style="display:none" onchange="addPersonImageFromFile(this)"></label>' +
      '<span class="save-msg" id="gallery-msg"></span>' +
    '</div>' +
  '</div>';
}

function syncCoverCache(p, url) {
  return patchSupa('persons', p, { image_url: url || null }).then(function(saved) {
    Object.assign(p, saved || { image_url: url || null });
  });
}

function addPersonImageRecord(p, url, makeItCover) {
  return insertSupa('person_images', { person_id: p.id, url: url, is_cover: !!makeItCover }).then(function(saved) {
    personImages.push(saved);
    if (makeItCover) return syncCoverCache(p, url);
  });
}

function addPersonImageFromUrl() {
  var p = profilePerson; if (!p) return;
  var input = document.getElementById('gallery-add-url');
  var url = normalizeUrl(input ? input.value : '');
  var msg = document.getElementById('gallery-msg');
  if (!url) { if (msg) msg.textContent = 'Keine gültige URL.'; return; }
  var isFirst = imagesForPerson(p).length === 0;
  addPersonImageRecord(p, url, isFirst).then(function() {
    if (input) input.value = '';
    render();
  }).catch(function(err) {
    if (msg) msg.textContent = 'Fehler: ' + err.message;
  });
}

function addPersonImageFromFile(inputEl) {
  var p = profilePerson; if (!p) return;
  var file = inputEl.files && inputEl.files[0];
  if (!file) return;
  var msg = document.getElementById('gallery-msg');
  if (msg) msg.textContent = 'Lädt hoch…';
  var isFirst = imagesForPerson(p).length === 0;
  uploadPersonImage(file).then(function(url) {
    return addPersonImageRecord(p, url, isFirst);
  }).then(function() {
    render();
  }).catch(function(err) {
    if (msg) msg.textContent = 'Fehler: ' + err.message;
  });
}

function setCoverImage(imageId) {
  var p = profilePerson; if (!p) return;
  var imgs = imagesForPerson(p);
  var target = imgs.find(function(i) { return String(i.id) === String(imageId); });
  if (!target) return;
  Promise.all(imgs.filter(function(i) { return i.is_cover && i.id !== target.id; })
    .map(function(i) { return patchSupa('person_images', i, { is_cover: false }).then(function(saved) { Object.assign(i, saved || { is_cover: false }); }); }))
    .then(function() { return patchSupa('person_images', target, { is_cover: true }); })
    .then(function(saved) { Object.assign(target, saved || { is_cover: true }); return syncCoverCache(p, target.url); })
    .then(render)
    .catch(function(err) { alert('Titelbild konnte nicht gesetzt werden: ' + err.message); });
}

function removePersonImage(imageId) {
  var p = profilePerson; if (!p) return;
  var imgs = imagesForPerson(p);
  var target = imgs.find(function(i) { return String(i.id) === String(imageId); });
  if (!target) return;
  fetch(SB + '/rest/v1/person_images?' + matchQuery('person_images', target), {
    method: 'DELETE', headers: supaHeaders('return=minimal')
  }).then(function(r) {
    if (!r.ok) return r.text().then(function(t) { throw new Error(parseSupaErr(t)); });
    personImages = personImages.filter(function(i) { return i.id !== target.id; });
    if (target.is_cover) {
      var remaining = imagesForPerson(p);
      var next = remaining[0];
      if (next) return setCoverImage(next.id);
      return syncCoverCache(p, '').then(render);
    }
    render();
  }).catch(function(err) { alert('Bild konnte nicht entfernt werden: ' + err.message); });
}

function startEnhance(filterKey) {
  filterKey = filterKey || null;
  var p = profilePerson;
  if (!p) return;

  var cfg = ENHANCE_FILTERS[filterKey] || ENHANCE_FILTERS[null];
  var allEntries = personEntries(p);
  var filteredEntries = cfg.filter ? allEntries.filter(cfg.filter) : allEntries;
  if (!filteredEntries.length) return;

  enhanceState = { phase: 'loading', personName: p.name, data: null, error: '', filterKey: filterKey, filterLabel: cfg.label };
  render();

  fetch('/api/enhance', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      person: p,
      entries: filteredEntries.map(entryForEnhance),
      context: cfg.context
    })
  })
  .then(function(r) {
    return r.json().then(function(data) {
      if (data._meta && data._meta.usage && !r.ok) persistAiUsage(data._meta.usage, null, p, 'failed', data.error);
      if (!r.ok || data.error) throw new Error(data.error || 'KI-Kuration fehlgeschlagen');
      return data;
    });
  })
  .then(function(data) {
    if (data._meta && data._meta.usage) persistAiUsage(data._meta.usage, null, p);
    enhanceState = { phase: 'review', personName: p.name, data: normalizeEnhanceData(data), error: '', filterKey: filterKey, filterLabel: cfg.label };
    render();
  })
  .catch(function(err) {
    enhanceState = { phase: 'error', personName: p.name, data: null, error: err.message, filterKey: filterKey, filterLabel: cfg.label };
    render();
  });
}

function cancelEnhance() {
  enhanceState = { phase: 'idle', personName: '', data: null, error: '' };
  render();
}

// Targeted "find N new entries of this category" — routes through the same
// review/save screen as a fresh name research, just scoped to one person +
// one category instead of a whole new dossier.
function startExpand(kategorie, count) {
  var p = profilePerson;
  if (!p) return;
  addState = { phase: 'loading', person: p, entries: [], prefill: p.name, job: null, usage: null, grounding: null, mode: 'expand' };
  goTab('add');

  fetch('/api/enhance', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ person: p, entries: personEntries(p).map(entryForEnhance), mode: 'expand', kategorie: kategorie, count: count || 2 })
  })
  .then(function(r) {
    return r.json().then(function(data) {
      if (data._meta && data._meta.usage) persistAiUsage(data._meta.usage, null, p, r.ok ? 'succeeded' : 'failed', data.error);
      if (!r.ok || data.error) throw new Error(data.error || 'Erweitern fehlgeschlagen');
      return data;
    });
  })
  .then(function(data) {
    addState = {
      phase: 'preview', person: p,
      entries: normalizeExtractEntries(data.entries),
      prefill: p.name, job: null,
      usage: data._meta && data._meta.usage,
      grounding: data._meta && data._meta.grounding,
      mode: 'expand'
    };
    render();
  })
  .catch(function(err) {
    showCaptureError(p.name, err, true);
  });
}

    anekdote: x.anekdote || '',
    fakt: x.fakt || '',
    buchnotiz: x.buchnotiz || '',
    quelle: x.quelle || '',
    quelle_url: x.quelle_url || '',
    staerke: x.staerke || null,
    quellenqualitaet: x.quellenqualitaet || '',
    buchreife: x.buchreife || '',
    themen: arr(x.themen),

    seitenrolle: x.seitenrolle || ''
  };
}

function normalizeEnhanceData(data) {
  data = data || {};
  var person = normalizePersonSuggestion(data.person || {});
  person.tags = arr((data.person || {}).tags);
  var byId = {};
  personEntries(profilePerson || {}).forEach(function(x) { if (x.id) byId[x.id] = x; });
  var eSugs = arr(data.entries).map(function(e) {
    e = e || {};
    return {
      id: e.id || '',
      staerke: normalizeStrength(e.staerke),
      quellenqualitaet: cleanChoice(e.quellenqualitaet, QUELLENQUALITAET, ''),
      buchreife: cleanChoice(e.buchreife, BUCHREIFE, ''),
      themen: arr(e.themen).filter(function(t) { return THEMA_LIST.indexOf(t) >= 0; }),
      ton: e.ton || '',
      seitenrolle: cleanChoice(e.seitenrolle, SEITENROLLE, ''),
      buchnotiz: e.buchnotiz || '',
      quelle: e.quelle || '',
      quelle_url: e.quelle_url || '',
      tags: arr(e.tags),
      _entry: byId[e.id] || null
    };
  }).filter(function(e) { return e.id && e._entry; });
  return {
    person: person,
    entries: eSugs,
    tag_mapping: arr(data.tag_mapping)
  };
}

function enhanceFilterBar(p, pEntries) {

    : '__none__';

  function chip(key, labelText, count, warn) {
    var isActive = (active === key || (key === null && active === '__none__' && enhanceState.personName !== p.name)) ? '' : '';
    var activeClass = (enhanceState.personName === p.name && enhanceState.filterKey === key && enhanceState.phase !== 'idle' && enhanceState.phase !== 'saved') ? ' active' : '';
    var warnStyle = warn ? ' style="color:var(--am)"' : '';

function reviewRow(scope, f, current, suggestion) {
  var id = 'enh-' + scope + '-' + f.key;
  var has = hasSuggestion(suggestion, f.type);
  var checked = has && fieldEmpty(current, f.key, f.type) ? ' checked' : '';
  var disabled = has ? '' : ' disabled';
  return '<div class="review-row">' +
    '<input type="checkbox" id="' + id + '-use"' + checked + disabled + '>' +
    '<div class="review-label">' + esc(f.label) + '</div>' +
    '<div>' +
      '<div class="review-current">Aktuell: ' + esc(displayValue(current, f.type) || '—') + '</div>' +
      inputForSuggestion(id, f, suggestion, !has, current) +
    '</div>' +
  '</div>';
}

function entryReviewBlock(entry, sug, i) {
  var title = (entry.kategorie || 'Eintrag') + ' · ' + (entry.buch === 'direkt' ? 'Direkt' : 'Hintergrund');
  var html =
    '<div class="review-entry" data-entry-id="' + esc(entry.id || '') + '">' +
      '<div class="review-entry-top">' +
        '<div><div class="review-entry-title">' + esc(title) + '</div><div class="review-entry-prev">' + esc(entryText(entry) || entry.preview || '') + '</div></div>' +
        '<span class="pill pill-q">' + esc((i + 1) + '/' + (enhanceState.data.entries || []).length) + '</span>' +
      '</div>' +
      '<div class="review-fields">';
  entryReviewFields().forEach(function(f) {
    var current = entry[f.key];
    var suggestion = sug[f.key];
    if (!hasSuggestion(suggestion, f.type)) return;
    var id = 'enh-e-' + i + '-' + f.key;
    var checked = fieldEmpty(current, f.key, f.type) ? ' checked' : '';
    html += '<div class="review-field">' +
      '<label><input type="checkbox" id="' + id + '-use"' + checked + '> ' + esc(f.label) + '</label>' +
      '<div class="review-current">Aktuell: ' + esc(displayValue(current, f.type) || '—') + '</div>' +
      inputForSuggestion(id, f, suggestion, false, current) +
    '</div>';
  });
  html += '</div></div>';
  return html;
}

// current (the field's existing value) is optional — passed by callers that
// have it in scope. For list fields the box is pre-filled with the merged
// (existing ∪ suggested) set, since that's what actually gets saved — the
// box is the source of truth, not a silent extra merge at save time. For
// prose fields, existing text is kept and the suggestion appended below a
// separator rather than replaced outright, so nothing is lost by default;
// the field stays fully editable if the user wants to trim either part.
function inputForSuggestion(id, f, value, disabled, current) {
  var dis = disabled ? ' disabled' : '';
  if (f.type === 'array') {
    var merged = current ? unique(arr(current).concat(arr(value))) : arr(value);
    return '<input id="' + id + '" class="ai" value="' + esc(displayValue(merged, f.type)) + '"' + dis + '>';
  }
  if (f.type === 'textarea') {
    var prefill = value || '';
    if (hasText(current) && String(current).trim() !== String(value || '').trim()) {
      prefill = current + '\n\n— KI-Ergänzung —\n' + value;
    }
    return '<textarea id="' + id + '" class="ai ai-ta" rows="3"' + dis + '>' + esc(prefill) + '</textarea>';
  }
  if (f.type === 'select') return '<select id="' + id + '" class="ai ai-sel"' + dis + '>' + opts(f.options || [], String(value || '')) + '</select>';
  return '<input id="' + id + '" class="ai" value="' + esc(displayValue(value, f.type)) + '"' + dis + '>';
}

function hasSuggestion(value, type) {
  if (type === 'array') return arr(value).length > 0;
  if (value === null || value === undefined) return false;
  return String(value).trim() !== '';
}

function displayValue(value, type) {
  if (type === 'array') return arr(value).map(label).join(', ');
  return value === null || value === undefined ? '' : String(value);
}

function fieldEmpty(value, key, type) {
  if (type === 'array') return arr(value).length === 0;
  if (key === 'staerke') return strength({ staerke: value }) < 1;
  if (key === 'quellenqualitaet') return !value || value === 'unbekannt';
  if (key === 'buchreife') return !value || value === 'roh';
  if (key === 'seitenrolle') return !value || value === 'unentschieden';
  if (key === 'quelle' || key === 'quelle_url') return !hasText(value);
  return !hasText(value);
}

function valueFromControl(id, f) {
  var el = document.getElementById(id);
  var raw = el ? el.value : '';
  if (f.type === 'array') {
    var values = splitList(raw);
    if (f.allowed) values = values.filter(function(v) { return f.allowed.indexOf(v) >= 0 || f.allowed.map(label).indexOf(v) >= 0; }).map(function(v) {
      var idx = f.allowed.map(label).indexOf(v);
      return idx >= 0 ? f.allowed[idx] : v;
    });
    return unique(values);
  }
  if (f.key === 'staerke') return normalizeStrength(raw) || null;
  if (f.key === 'quellenqualitaet') return cleanChoice(raw, QUELLENQUALITAET, 'unbekannt');
  if (f.key === 'buchreife') return cleanChoice(raw, BUCHREIFE, 'roh');
  if (f.key === 'seitenrolle') return cleanChoice(raw, SEITENROLLE, 'unentschieden');
  if (f.key === 'quelle_url') return normalizeUrl(raw);
  return raw;
}

function applyEnhanceSuggestions() {
  var p = profilePerson;
  if (!p || !enhanceState.data) return;
  var btn = document.getElementById('enhance-apply');
  var msg = document.getElementById('enhance-msg');
  if (btn) { btn.disabled = true; btn.textContent = 'Speichert…'; }
  if (msg) msg.textContent = '';

  var jobs = [];
  var pPayload = {};

  profileReviewFields().forEach(function(f) {
    var id = 'enh-p-' + f.key;
    var use = document.getElementById(id + '-use');
    if (!use || !use.checked || use.disabled) return;
    // Box already shows the merged/combined value (see inputForSuggestion) —
    // it's the source of truth, so no extra merge with the old value here.
    pPayload[f.key] = valueFromControl(id, f);
  });

  if (Object.keys(pPayload).length) {
    jobs.push(patchSupa('persons', p, pPayload).then(function(saved) {
      Object.assign(p, saved || pPayload);
      profilePerson = p;
    }));
  }

  (enhanceState.data.entries || []).forEach(function(sug, i) {
    var entry = sug._entry;
    if (!entry) return;
    var payload = {};
    entryReviewFields().forEach(function(f) {
      var id = 'enh-e-' + i + '-' + f.key;
      var use = document.getElementById(id + '-use');
      if (!use || !use.checked) return;
      // Box already shows the merged/combined value (see inputForSuggestion).
      payload[f.key] = valueFromControl(id, f);
    });
    if (Object.keys(payload).length) {
      // Auto-map tags → themen, based on whichever tag set will actually be saved.
      var finalTags = arr(payload.tags !== undefined ? payload.tags : entry.tags);
      var autoThemen = finalTags.map(themeForTag).filter(Boolean);
      if (autoThemen.length) {
        payload.themen = unique(arr(payload.themen !== undefined ? payload.themen : entry.themen).concat(autoThemen));
      }
      jobs.push(patchSupa('entries', entry, payload).then(function(saved) {
        Object.assign(entry, saved || payload);
      }));
    }
  });

  if (!jobs.length) {
    if (btn) { btn.disabled = false; btn.textContent = 'Ausgewählte übernehmen'; }
    if (msg) msg.textContent = 'Keine Felder ausgewählt.';
    return;
  }

  Promise.all(jobs).then(function() {
    normalizeData();
    updateStats();
    enhanceState = { phase: 'saved', personName: p.name, data: null, error: '' };
    render();
  }).catch(function(err) {
    if (btn) { btn.disabled = false; btn.textContent = 'Ausgewählte übernehmen'; }
    if (msg) msg.textContent = 'Fehler: ' + err.message;
  });
}

// ── ENTRIES ──────────────────────────────────────
function rEntries(main, s) {
  var data = entries.filter(function(x) {
    if (fil.kat  && x.kategorie !== fil.kat)  return false;
    if (fil.buch && x.buch !== fil.buch)       return false;
    if (fil.reife && x.buchreife !== fil.reife) return false;
    if (fil.curEntry === 'strong_entries' && strength(x) < 4) return false;
    if (fil.curEntry === 'unchecked_entries' && !entryUnchecked(x)) return false;
    if (fil.curEntry === 'unlinked_entries' && !entryUnlinked(x)) return false;
    return hit(x, s);
  });
  document.getElementById('cnt').textContent = data.length + ' Einträge';
  main.innerHTML = '';
  if (!data.length) {
    main.innerHTML = '<div class="empty"><div class="empty-ico">○</div>Keine Einträge gefunden.</div>';
    return;
  }
  data.forEach(function(x) { main.appendChild(mkEntryCard(x, true)); });
}

function mkEntryCard(x, showPerson) {
  var kat    = x.kategorie || 'Sonstige';

  var tags   = (x.tags || []).map(function(t) { return '<span class="pill pill-tag">' + esc(t) + '</span>'; }).join('');
  var meta   = entryMetaPills(x);
  var status = '<span class="buch-badge ' + bbCls + '">' + bbLbl + '</span>' + meta;
  var sep    = (status && tags) ? '<span class="ce-sep"></span>' : '';

  var d = document.createElement('div'); d.className = 'card';
  d.innerHTML =
    '<div class="ch">' +
      '<div class="ci ' + ciCls + '">' + icon + '</div>' +
      '<div class="cl">' +
        (showPerson && x.person
          ? '<div class="ce-person" data-person="' + esc(x.person) + '">' + esc(x.person) + '</div>'
          : '') +

        '<div class="ce-meta">' + status + sep + tags + '</div>' +

      '<div class="carr">▾</div>' +
    '</div>' +
    '<div class="cd"><div class="cd-in">' +

      (x.anekdote ? '<div><div class="lbl">Anekdote</div><div class="val">'   + esc(x.anekdote) + '</div></div>' : '') +
      (x.fakt     ? '<div><div class="lbl">Fakt</div><div class="val-fakt">'  + esc(x.fakt)     + '</div></div>' : '') +

      (x.quelle || x.quelle_url ? '<div class="src">Quelle: ' + esc(x.quelle || '') + (x.quelle_url ? ' · <a href="' + esc(x.quelle_url) + '" target="_blank" rel="noopener">Link</a>' : '') + '</div>' : '') +
      '<div class="actions"><button class="mini-btn primary entry-enhance-btn">KI-Vorschlag</button><button class="mini-btn entry-edit-btn">Bearbeiten</button></div>' +
    '</div></div>';

  d.querySelector('.ch').onclick = function(e) {
    if (e.target.dataset && e.target.dataset.person) {
      var pp = persons.find(function(p) { return p.name === e.target.dataset.person; });
      if (pp) showProfile(pp);
      return;
    }
    d.classList.toggle('open');
  };
  d.querySelector('.entry-edit-btn').onclick = function(e) {
    e.stopPropagation();
    d.classList.add('open');
    renderEntryEdit(d, x);
  };
  d.querySelector('.entry-enhance-btn').onclick = function(e) {
    e.stopPropagation();
    d.classList.add('open');
    renderSingleEntryEnhance(d, x);
  };
  return d;
}

function renderSingleEntryEnhance(card, x) {
  var root = card.querySelector('.cd-in');
  root.innerHTML =
    '<div class="enhance-panel" style="margin-bottom:0">' +
      '<div class="enhance-hd">' +
        '<div><div class="enhance-title">KI-Vorschlag für diesen Eintrag</div><div class="enhance-sub">Gemini bewertet nur diesen vorhandenen Eintrag. Gespeichert wird erst nach Auswahl.</div></div>' +
        '<button class="mini-btn entry-cancel">Zurück</button>' +
      '</div>' +
      '<div class="enhance-loading">Vorschlag wird erzeugt…</div>' +
    '</div>';
  root.querySelector('.entry-cancel').onclick = function() { render(); };

  fetch('/api/enhance', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      person: findPersonByName(x.person) || { name: x.person },
      entries: [entryForEnhance(x)],
      context: 'Nur diesen einen Eintrag kuratorisch bewerten. Keine Profilfelder nötig, keine neuen Einträge.'
    })
  })
  .then(function(r) {
    return r.json().then(function(data) {
      if (data._meta && data._meta.usage && !r.ok) persistAiUsage(data._meta.usage, null, findPersonByName(x.person), 'failed', data.error);
      if (!r.ok || data.error) throw new Error(data.error || 'KI-Kuration fehlgeschlagen');
      return data;
    });
  })
  .then(function(data) {
    if (data._meta && data._meta.usage) persistAiUsage(data._meta.usage, null, findPersonByName(x.person));
    var sug = normalizeSingleEntrySuggestion((data.entries || [])[0] || {});
    root.innerHTML = singleEntryEnhanceHtml(x, sug);
    root.querySelector('.single-enhance-save').onclick = function() { saveSingleEntryEnhance(root, x); };
    root.querySelectorAll('.single-enhance-cancel').forEach(function(b) { b.onclick = function() { render(); }; });
  })
  .catch(function(err) {
    root.innerHTML =
      '<div class="enhance-panel" style="margin-bottom:0">' +
        '<div class="enhance-hd">' +
          '<div><div class="enhance-title">KI-Vorschlag</div><div class="enhance-sub">Fehler: ' + esc(err.message) + '</div></div>' +
          '<button class="mini-btn single-enhance-cancel">Zurück</button>' +
        '</div>' +

    root.querySelector('.single-enhance-cancel').onclick = function() { render(); };
  });
}

  var prefix = 'enh-single-' + String(x.id || 'entry').replace(/[^a-zA-Z0-9_-]/g, '');
  var html =
    '<div class="enhance-panel" style="margin-bottom:0">' +
      '<div class="enhance-hd">' +
        '<div><div class="enhance-title">Vorschlag prüfen</div><div class="enhance-sub">Häkchen setzen, Werte bei Bedarf ändern, dann übernehmen. Tags/Themen werden ergänzt, Text wird angehängt — beides direkt im Feld editierbar.</div></div>' +
        '<button class="mini-btn single-enhance-cancel">Zurück</button>' +
      '</div>' +
      '<div class="review-entry-prev">' + esc(entryText(x) || x.preview || '') + '</div>' +
      '<div class="review-fields" style="margin-top:12px">';
  var shown = 0;
  entryReviewFields().forEach(function(f) {
    var suggestion = sug[f.key];
    if (!hasSuggestion(suggestion, f.type)) return;
    shown++;
    var id = prefix + '-' + f.key;
    var checked = fieldEmpty(x[f.key], f.key, f.type) ? ' checked' : '';
    html += '<div class="review-field">' +
      '<label><input type="checkbox" id="' + id + '-use"' + checked + '> ' + esc(f.label) + '</label>' +
      '<div class="review-current">Aktuell: ' + esc(displayValue(x[f.key], f.type) || '—') + '</div>' +
      inputForSuggestion(id, f, suggestion, false, x[f.key]) +
    '</div>';
  });
  if (!shown) html += '<div class="readonly-note">Gemini hat keine nutzbaren Felder vorgeschlagen.</div>';
  html += '</div>' +
    '<div class="entry-edit-actions">' +
      '<button class="mini-btn primary single-enhance-save" data-prefix="' + esc(prefix) + '">Ausgewählte übernehmen</button>' +
      '<button class="mini-btn single-enhance-cancel">Abbrechen</button>' +
      '<span class="save-msg"></span>' +
    '</div>' +
  '</div>';
  return html;
}

function saveSingleEntryEnhance(root, x) {
  var btn = root.querySelector('.single-enhance-save');
  var msg = root.querySelector('.save-msg');
  var prefix = btn.getAttribute('data-prefix');
  var payload = {};
  entryReviewFields().forEach(function(f) {
    var id = prefix + '-' + f.key;
    var use = document.getElementById(id + '-use');
    if (!use || !use.checked) return;
    // The box already shows the merged (existing ∪ suggested) value for
    // list fields and the combined text for prose fields — it's the
    // source of truth, including any trims the user made, so no extra
    // merge-with-old happens here (that would silently undo those edits).
    payload[f.key] = valueFromControl(id, f);
  });
  if (!Object.keys(payload).length) {
    if (msg) msg.textContent = 'Keine Felder ausgewählt.';
    return;
  }
  // Auto-map tags → themen, based on whichever tag set will actually be saved.
  var finalTags = arr(payload.tags !== undefined ? payload.tags : x.tags);
  var autoThemen = finalTags.map(themeForTag).filter(Boolean);
  if (autoThemen.length) {
    payload.themen = unique(arr(payload.themen !== undefined ? payload.themen : x.themen).concat(autoThemen));
  }
  btn.disabled = true; btn.textContent = 'Speichert…';
  patchSupa('entries', x, payload).then(function(saved) {
    Object.assign(x, saved || payload);
    normalizeData();
    render();
  }).catch(function(err) {
    btn.disabled = false; btn.textContent = 'Ausgewählte übernehmen';
    if (msg) msg.textContent = 'Fehler: ' + err.message;
  });
}

// ── UTILS ─────────────────────────────────────────
function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function label(v) { return LABEL[v] || v; }
function hasText(v) { return !!String(v || '').trim(); }

// Both AI suggestions and manual entry save a quelle_url straight into
// <a href>. A bare domain like "rogerebert.com" is a valid-looking string
// but resolves as a relative link (→ 404 on this app's own domain) rather
// than an error, so it silently produces a dead source link. Prepend
// https:// when the value looks like a bare host; leave anything else
// (already-schemed URLs, empty, or clearly not a URL) untouched.
function normalizeUrl(u) {
  var s = String(u || '').trim();
  if (!s) return '';
  if (/^https?:\/\//i.test(s)) return s;
  if (/^[a-z0-9]([a-z0-9-]*[a-z0-9])?(\.[a-z0-9]([a-z0-9-]*[a-z0-9])?)+([/?#].*)?$/i.test(s)) return 'https://' + s;
  return s;
}
function arr(v) {
  if (Array.isArray(v)) return v.filter(function(x) { return x !== null && x !== undefined && String(x).trim() !== ''; });
  if (!v) return [];
  if (typeof v === 'string') {
    var s = v.trim();
    if (!s) return [];
    if (s.charAt(0) === '[') {
      try { return arr(JSON.parse(s)); } catch(e) {}
    }
    return s.split(',').map(function(x) { return x.trim(); }).filter(Boolean);
  }
  return [];
}
function splitList(s) { return arr(s); }
function unique(xs) {
  var seen = {};
  return arr(xs).filter(function(x) {
    var key = String(x).toLowerCase();
    if (seen[key]) return false;
    seen[key] = true;
    return true;
  });
}
function val(id) {
  var el = document.getElementById(id);
  return el ? el.value : '';
}
function opts(values, current) {
  return values.map(function(v) {
    var selected = String(current || '') === String(v) ? ' selected' : '';
    var text = v === '' ? '—' : label(v);
    return '<option value="' + esc(v) + '"' + selected + '>' + esc(text) + '</option>';
  }).join('');
}
function personOptions(current) {
  var html = '<option value="">— Zuordnung offen —</option>';
  return html + persons.slice().sort(function(a,b){ return String(a.name).localeCompare(String(b.name), 'de'); }).map(function(p) {
    return '<option value="' + esc(p.id) + '"' + (String(current || '') === String(p.id) ? ' selected' : '') + '>' + esc(p.name) + '</option>';
  }).join('');
}
function checkGroup(name, values, selected) {
  selected = arr(selected);
  return '<div class="checkgrid">' + values.map(function(v) {
    var checked = selected.indexOf(v) >= 0 ? ' checked' : '';
    return '<label class="checkchip"><input type="checkbox" name="' + esc(name) + '" value="' + esc(v) + '"' + checked + '> ' + esc(label(v)) + '</label>';
  }).join('') + '</div>';
}
function getChecked(name) {
  return Array.prototype.slice.call(document.querySelectorAll('input[name="' + name + '"]:checked')).map(function(x) { return x.value; });
}
function getCheckedIn(root, name) {
  return Array.prototype.slice.call(root.querySelectorAll('input[name="' + name + '"]:checked')).map(function(x) { return x.value; });
}

function curationItem(title, value, full, emphasis, alwaysFull) {
  var cls = full || alwaysFull ? ' full' : '';
  var valCls = emphasis ? 'curation-val em' : 'curation-val';
  var text = hasText(value) ? '<div class="' + valCls + '">' + esc(value) + '</div>' : '<div class="curation-empty">Noch offen</div>';
  return '<div class="curation-item' + cls + '"><div class="lbl">' + esc(title) + '</div>' + text + '</div>';
}

function strength(x) {
  var n = Number(x && x.staerke);
  return isNaN(n) ? 0 : n;
}
function entryUnchecked(x) {
  return !x.quellenqualitaet || x.quellenqualitaet === 'unbekannt';
}
function entryText(x) {
  if (x.kategorie === 'Zitat') return x.quote || x.anekdote || x.fakt || '';
  if (x.kategorie === 'Fakt') return x.fakt || x.anekdote || x.quote || '';
  return x.anekdote || x.quote || x.fakt || x.text || '';
}
function entryMetaPills(x) {
  var bits = '';
  if (strength(x) >= 4) bits += '<span class="pill pill-s">Stärke ' + strength(x) + '</span>';
  else if (strength(x) > 0) bits += '<span class="pill">Stärke ' + strength(x) + '</span>';
  if (x.buchreife) bits += '<span class="pill pill-q">' + esc(label(x.buchreife)) + '</span>';
  if (entryUnchecked(x)) bits += '<span class="pill pill-w">Quelle offen</span>';
  if (entryUnlinked(x)) bits += '<span class="pill pill-w">Zuordnung offen</span>';
  return bits;
}
function entryUnlinked(x) {
  return tableAvailability.books === true && !x.person_id;
}
function entryCurationHtml(x) {
  var hasCur = strength(x) || x.quellenqualitaet || x.buchreife || arr(x.themen).length || x.ton || x.seitenrolle;
  if (!hasCur) return '';
  return '<div class="entry-curation">' +
    '<div><div class="lbl">Stärke</div><div class="val">' + (strength(x) || '—') + '</div></div>' +
    '<div><div class="lbl">Buchreife</div><div class="val">' + esc(label(x.buchreife || 'roh')) + '</div></div>' +
    '<div><div class="lbl">Quelle</div><div class="val">' + esc(label(x.quellenqualitaet || 'unbekannt')) + '</div></div>' +
    '<div><div class="lbl">Seitenrolle</div><div class="val">' + esc(label(x.seitenrolle || 'unentschieden')) + '</div></div>' +
    (x.ton ? '<div><div class="lbl">Ton</div><div class="val">' + esc(x.ton) + '</div></div>' : '') +
    (arr(x.themen).length ? '<div class="full"><div class="lbl">Themen</div><div class="ce-meta">' + arr(x.themen).map(function(t) { return '<span class="pill">' + esc(label(t)) + '</span>'; }).join('') + '</div></div>' : '') +
  '</div>';
}

function personEntries(p) {
  return entries.filter(function(x) {
    if (x.person_id && p.id) return String(x.person_id) === String(p.id);
    return x.person === p.name;
  });
}
function findPersonByName(name) {
  var n = String(name || '').toLowerCase().trim();
  if (!n) return null;
  return persons.find(function(p) { return String(p.name || '').toLowerCase().trim() === n; }) || null;
}
function showProfileByName(name) {
  var p = findPersonByName(name);
  if (p) showProfile(p);
}
function cleanChoice(v, allowed, fallback) {
  return allowed.indexOf(v) >= 0 ? v : fallback;
}
function normalizeStrength(v) {
  var n = Number(v);
  return n >= 1 && n <= 5 ? n : '';
}
function normalizePersonSuggestion(p) {
  p = p || {};
  return {
    name: p.name || '',
    kategorie: p.kategorie || '',
    dates: p.dates || '',
    status: p.status || 'kandidat',
    tags: arr(p.tags),
    note: p.note || '',
    lebensprinzip: p.lebensprinzip || '',
    buchthese: p.buchthese || '',
    archetyp: p.archetyp || '',
    spannung: p.spannung || '',
    visuelles_motiv: p.visuelles_motiv || '',
    format_eignung: arr(p.format_eignung).filter(function(t) { return FORMAT_EIGNUNG.indexOf(t) >= 0; }),
    kurationsnotiz: p.kurationsnotiz || ''
  };
}
function mergePersonSuggestion(existing, incoming) {
  var p = normalizePersonSuggestion(existing);
  p.name = existing.name || incoming.name || '';
  ['kategorie','dates','status','note','lebensprinzip','buchthese','archetyp','spannung','visuelles_motiv','kurationsnotiz'].forEach(function(k) {
    if (!hasText(p[k]) && hasText(incoming[k])) p[k] = incoming[k];
  });
  p.tags = unique(arr(existing.tags).concat(arr(incoming.tags)));
  p.format_eignung = unique(arr(existing.format_eignung).concat(arr(incoming.format_eignung)));
  return p;
}
function personReadiness(p) {
  var pe = personEntries(p);
  var hasA = pe.some(function(x) { return x.kategorie === 'Anekdote'; });
  var hasZ = pe.some(function(x) { return x.kategorie === 'Zitat'; });
  var hasStrong = pe.some(function(x) { return strength(x) >= 4; });
  var unchecked = pe.some(entryUnchecked);
  return {
    hasA: hasA,
    hasZ: hasZ,
    hasStrong: hasStrong,
    hasPrinciple: hasText(p.lebensprinzip),
    hasThesis: hasText(p.buchthese),
    hasVisual: hasText(p.visuelles_motiv),
    hasFormat: arr(p.format_eignung).length > 0,
    sourceOk: pe.length > 0 && !unchecked,
    ready: hasText(p.lebensprinzip) && hasText(p.buchthese) && hasA && hasZ && hasStrong
  };
}
function personMatchesCuration(p, key) {
  var r = personReadiness(p);
  if (key === 'fehlende_these') return !r.hasThesis;
  if (key === 'starke_personen') return r.hasStrong;
  if (key === 'ungepruefte_quellen') return !r.sourceOk;
  if (key === 'formatbereit') return r.hasFormat;
  if (key === 'buchreif') return r.ready;
  return true;
}

function supaHeaders(prefer) {
  return {
    'apikey': SK,
    'Authorization': 'Bearer ' + SK,
    'Content-Type': 'application/json',
    'Prefer': prefer || 'return=representation'
  };
}
function parseSupaErr(t) {
  try { var j = JSON.parse(t); return j.message || j.details || t; } catch(e) { return t; }
}
function handleSupa(r) {
  if (!r.ok) return r.text().then(function(t) { throw new Error(parseSupaErr(t) || 'Supabase-Fehler'); });
  if (r.status === 204) return null;
  return r.text().then(function(t) {
    if (!t) return null;
    try { var data = JSON.parse(t); return Array.isArray(data) ? data[0] : data; } catch(e) { return null; }
  });
}
function matchQuery(table, item) {
  if (item && item.id) return 'id=eq.' + encodeURIComponent(item.id);
  if (table === 'persons' && item && item.name) return 'name=eq.' + encodeURIComponent(item.name);
  if (table === 'entries' && item && item.created_at) return 'created_at=eq.' + encodeURIComponent(item.created_at);
  if (table === 'entries' && item && item.person && item.preview) {
    return 'person=eq.' + encodeURIComponent(item.person) + '&preview=eq.' + encodeURIComponent(item.preview);
  }
  throw new Error('Kein stabiler Schlüssel für Update gefunden. Bitte die Datenbankmigration mit id-Spalten anwenden.');
}
function patchSupa(table, item, payload) {
  return fetch(SB + '/rest/v1/' + table + '?' + matchQuery(table, item), {
    method: 'PATCH',
    headers: supaHeaders('return=representation'),
    body: JSON.stringify(payload)
  }).then(handleSupa);
}
function insertSupa(table, payload) {
  return fetch(SB + '/rest/v1/' + table, {
    method: 'POST',
    headers: supaHeaders('return=representation'),
    body: JSON.stringify(payload)
  }).then(handleSupa);
}
var IMAGE_MAX_BYTES = 8 * 1024 * 1024;

// Uploads directly to the public person-images bucket (anon insert-only,
// see the migration) and resolves to the object's public URL — same URL
// shape works whether the image came from an upload or was pasted in.
function uploadPersonImage(file) {
  if (!file) return Promise.reject(new Error('Keine Datei ausgewählt.'));
  if (!/^image\//.test(file.type)) return Promise.reject(new Error('Nur Bilddateien sind erlaubt.'));
  if (file.size > IMAGE_MAX_BYTES) return Promise.reject(new Error('Datei zu groß (max. 8 MB).'));
  var ext = (file.name.split('.').pop() || 'jpg').toLowerCase().replace(/[^a-z0-9]/g, '') || 'jpg';
  var path = 'p-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8) + '.' + ext;
  return fetch(SB + '/storage/v1/object/person-images/' + path, {
    method: 'POST',
    headers: { 'apikey': SK, 'Authorization': 'Bearer ' + SK, 'Content-Type': file.type },
    body: file
  }).then(function(r) {
    if (!r.ok) return r.text().then(function(t) { throw new Error(parseSupaErr(t)); });
    return SB + '/storage/v1/object/public/person-images/' + path;
  });
}

// ── BIO FORMATTER ─────────────────────────────────
function formatBio(note) {
  if (!note) return '';

  // Protect abbreviations that contain ". " but aren't sentence ends
  var abbrs = ['St','Dr','Mr','Mrs','Prof','Nr','Jr','Sr','vs','ca','Abb','evtl','bzw','sog','u.a','z.B'];
  var protectedText = note;
  abbrs.forEach(function(a) {
    // Replace "Abbr. " with placeholder
    var re = new RegExp(a + '\\.( )', 'g');
    protectedText = protectedText.replace(re, a + '\x02$1');
  });
  // Also protect ordinal numbers: "5. Juli", "17. März" etc.
  protectedText = protectedText.replace(/(\d)\. ([A-Za-züäöÜÄÖ])/g, '$1\x02 $2');

  // Split at true sentence boundaries:
  // lowercase/digit/closing-paren + ". " + uppercase
  protectedText = protectedText.replace(/([a-züäöß\d\)])\. ([A-ZÜÄÖ"])/g, '$1.\x01$2');

  var parts = protectedText.split('\x01');

  // Restore protected abbreviations
  var sentences = parts.map(function(s) {
    return s.replace(/\x02/g, '.').trim();
  }).filter(Boolean);

  if (sentences.length <= 1) {
    return '<div class="bio-kicker">' + esc(note) + '</div>';
  }

  // First sentence → kicker
  var html = '<div class="bio-kicker">' + esc(sentences[0]) + '</div><div class="bio-body">';

  // Remaining → group 3 per paragraph
  var rest = sentences.slice(1);
  for (var i = 0; i < rest.length; i += 3) {
    html += '<p>' + rest.slice(i, i + 3).map(function(s) { return esc(s); }).join(' ') + '</p>';
  }

  html += '</div>';
  return html;
}

function activeBook() {
  return books.find(function(b) { return b.status === 'active' || b.status === 'pilot'; }) || books[0] || null;
}

function personById(id) {
  return persons.find(function(p) { return String(p.id) === String(id); }) || null;
}

function candidateFor(p) {
  var book = activeBook();
  if (!book || !p) return null;
  return bookCandidates.find(function(c) {
    return String(c.book_id) === String(book.id) && String(c.person_id) === String(p.id);
  }) || null;
}

function fitScore(c) {
  if (!c || !FIT_FIELDS.every(function(f) { return c[f[0]] !== null && c[f[0]] !== undefined; })) return null;
  return FIT_FIELDS.reduce(function(sum, f) { return sum + Number(c[f[0]] || 0); }, 0);
}

function fitLabel(score) {
  if (score >= 10) return 'Kernkandidat';
  if (score >= 7) return 'Starker Fit';
  if (score >= 4) return 'Noch offen';
  return 'Parken prüfen';
}

function dossierModel(p) {
  var pe = personEntries(p);
  var scenes = pe.filter(function(x) { return x.kategorie === 'Anekdote'; }).length;
  var reliableQuote = pe.some(function(x) {
    return x.kategorie === 'Zitat' && hasText(x.quelle) && ['primaer','geprueft'].indexOf(x.quellenqualitaet) >= 0;
  });
  var checks = [
    ['Buchthese', hasText(p.buchthese)],
    ['Lebensprinzip', hasText(p.lebensprinzip)],
    ['Widerspruch / Preis', hasText(p.spannung)],
    ['Zwei konkrete Szenen', scenes >= 2],
    ['Belastbares Zitat', reliableQuote],
    ['Quellen geprüft', pe.length > 0 && pe.every(function(x) { return !entryUnchecked(x); })],
    ['Visuelles Motiv', hasText(p.visuelles_motiv)],
    ['Redaktionelles Fazit', hasText(p.kurationsnotiz)]
  ];
  return { checks: checks, count: checks.filter(function(x) { return x[1]; }).length };
}

function openSourceCount() {
  return entries.filter(entryUnchecked).length;
}

// Feeds the AI's source-research prompt with real examples of sources we've
// already vetted, so it targets the same kind of citation instead of just
// following abstract rules. Only entries a human/AI has already rated
// primaer/geprueft qualify — roh/unbekannt entries would teach the wrong lesson.
function bestSourceExamples() {
  return entries
    .filter(function(e) { return (e.quellenqualitaet === 'geprueft' || e.quellenqualitaet === 'primaer') && hasText(e.quelle); })
    .sort(function(a, b) {
      var rank = { geprueft: 1, primaer: 0 };
      return (rank[b.quellenqualitaet] - rank[a.quellenqualitaet]) || ((b.staerke || 0) - (a.staerke || 0));
    })
    .slice(0, 5)
    .map(function(e) {
      return { quelle: e.quelle, quelle_url: e.quelle_url || '', quellenqualitaet: e.quellenqualitaet };
    });
}

// Makes the extract/enhance pipeline's research stage inspectable: which
// model ran, whether Google Search actually fired (see grounded-research.js
// — it silently doesn't for some prompt shapes), what it searched for, and
// which real sources came back. Without this, "Person X existiert bereits"
// looks like a bug report waiting to happen even when the research behind
// it was genuine — collapsed by default to stay out of the way otherwise.
function researchProcessHtml(usage, grounding) {
  if (!usage) return '';
  var rows = [];
  rows.push('<div class="research-log-row"><span class="research-log-lbl">Modell</span><span>' + esc(usage.model || '—') + '</span></div>');
  rows.push('<div class="research-log-row"><span class="research-log-lbl">Token / Kosten</span><span>' + Number(usage.totalTokens || 0).toLocaleString('de-DE') + ' Token · ' + formatEuro(usage.estimatedCostEur || 0) + '</span></div>');

  if (grounding && grounding.used) {
    var queries = arr(grounding.queries), sources = arr(grounding.sources);
    rows.push('<div class="research-log-row"><span class="research-log-lbl">Google-Suche</span><span>Genutzt · ' + queries.length + ' Anfrage' + (queries.length === 1 ? '' : 'n') + ' · ' + sources.length + ' Quelle' + (sources.length === 1 ? '' : 'n') + ' gefunden</span></div>');
    if (queries.length) {
      rows.push('<div class="research-log-row"><span class="research-log-lbl">Suchbegriffe</span><span>' + queries.map(function(q) { return '„' + esc(q) + '"'; }).join(', ') + '</span></div>');
    }
    if (sources.length) {
      rows.push('<div class="research-log-row"><span class="research-log-lbl">Quellen</span><div class="research-log-sources">' +
        sources.map(function(s) {
          var url = normalizeUrl(s.url);
          return url ? '<a href="' + esc(url) + '" target="_blank" rel="noopener">' + esc(s.title || url) + '</a>' : esc(s.title || 'ohne URL');
        }).join('') +
      '</div></div>');
    }
  } else {
    var reason = grounding && grounding.error ? 'Fehlgeschlagen (' + grounding.error + ')' : 'Nicht ausgelöst';
    rows.push('<div class="research-log-row"><span class="research-log-lbl">Google-Suche</span><span class="research-log-warn">' + esc(reason) + ' — Vorschläge stammen aus Trainingswissen. quellenqualitaet wurde deshalb auf „unbekannt" begrenzt, auch wenn eine Quelle genannt ist.</span></div>');
  }

  return '<details class="research-log"><summary>Recherche-Protokoll</summary>' +
    '<div class="research-log-body">' + rows.join('') + '</div>' +
    '<div class="research-log-criteria"><strong>Wie Quellenqualität bewertet wird:</strong> „primär" = plausibel zuordenbares Originalwerk; „sekundär" = Biografie/Sekundärliteratur; „unbekannt" = keine belastbare Quelle gefunden. „geprüft" vergibt die KI nie automatisch — das bleibt eine menschliche Entscheidung.</div>' +
  '</details>';
}

function openResearchJob(id) {
  var job = researchJobs.find(function(j){ return String(j.id) === String(id); });
  var suggestion = job && job.result_summary && job.result_summary.suggestion;
  if (!job || !suggestion) return;
  var person = personById(job.person_id) || findPersonByName(job.input_name);
  if (!person) return;
  addState = {
    phase:'preview', person:mergePersonSuggestion(person, normalizePersonSuggestion(suggestion.person || {})),
    entries:normalizeExtractEntries(suggestion.entries), prefill:job.input_name || person.name, job:job,
    usage:job.result_summary.meta && job.result_summary.meta.usage,
    grounding:job.result_summary.meta && job.result_summary.meta.grounding,
    mode:'capture'
  };
  goTab('add');
}

var queueResumeBusy = false;
function resumeQueuedResearch() {
  if (queueResumeBusy || tableAvailability.research_jobs !== true) return;
  var now = Date.now();
  var job = researchJobs.find(function(j) {
    if (j.mode !== 'extract') return false;
    if (j.status === 'queued') return true;
    return j.status === 'running' && now - new Date(j.updated_at || j.created_at || 0).getTime() > 120000;
  });
  if (!job) return;
  var person = personById(job.person_id) || findPersonByName(job.input_name);
  if (!person) return;
  queueResumeBusy = true;
  claimResearchJob(job)
    .then(function(saved) {
      if (!saved) { var err = new Error('Job wurde bereits übernommen'); err.code = 'JOB_ALREADY_CLAIMED'; throw err; }
      Object.assign(job, saved);
      return fetch('/api/extract', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ input:job.input_name, context:job.context || '', sourceExamples:bestSourceExamples() }) });
    })
    .then(function(r) { return r.json().then(function(data) {
      if (data._meta && data._meta.usage) persistAiUsage(data._meta.usage, job, person, r.ok ? 'succeeded' : 'failed', data.error);
      if (!r.ok || data.error) throw new Error(data.error || 'Recherche fehlgeschlagen');
      return data;
    }); })
    .then(function(data) {
      return patchSupa('research_jobs', job, {
        status:'review', current_step:'review',
        result_summary:{ entries:(data.entries || []).length, person_name:(data.person || {}).name || person.name, suggestion:{person:data.person, entries:data.entries}, meta:data._meta || {} }
      }).then(function(saved){ Object.assign(job, saved || {}); });
    })
    .catch(function(err) {
      if (err.code === 'JOB_ALREADY_CLAIMED') { job.status = 'running'; job.updated_at = new Date().toISOString(); }
      else patchSupa('research_jobs', job, { status:'failed', current_step:'research', last_error:String(err.message || err), finished_at:new Date().toISOString() }).then(function(saved){ Object.assign(job, saved || {}); }).catch(function(){});
    })
    .finally(function() { queueResumeBusy = false; if (view === 'status') render(); setTimeout(resumeQueuedResearch, 50); });
}

// ── KOSTEN / LIMITS ──────────────────────────────
// GEMINI_GROUNDING_FREE_MONTHLY mirrors the documented Tier 1 allowance for
// Gemini 3 models (5,000 grounded prompts/month, shared across models, then
// billed per search) — see https://ai.google.dev/gemini-api/docs/pricing.
// RPM/TPM/RPD are intentionally not hardcoded here: Google does not publish
// a single authoritative per-model table for those (they vary by account/
// tier and are only reliably visible in AI Studio), so asserting numbers
// here would risk being quietly wrong. We show recent throughput instead
// and link to the live source.
var GEMINI_GROUNDING_FREE_MONTHLY = 5000;

      'Läuft dieser zweite Schritt über den kostenlosen Schlüssel, zeigt diese Seite dafür 0,00 € — übrig bleibt nur die Such-Gebühr aus Schritt eins, falls eine Suche stattgefunden hat.</div>' +

    pipeRow(groundedThisMonth + ' / ' + GEMINI_GROUNDING_FREE_MONTHLY + ' kostenlose Anfragen diesen Monat', groundedThisMonth, GEMINI_GROUNDING_FREE_MONTHLY) +
    '<div class="readonly-note">' + (groundedThisMonth < GEMINI_GROUNDING_FREE_MONTHLY

      : 'Kostenloses Kontingent diesen Monat aufgebraucht — weitere Suchanfragen werden berechnet.') + '</div>' +

  html += '<div class="dash-card" style="margin-bottom:12px">' +

      '<div class="dash-card-note">Google veröffentlicht RPM/TPM/RPD nicht als feste Tabelle pro Modell — die genauen Werte hängen von Konto und Tier ab. Live-Stand: <a class="subtle-link" href="https://aistudio.google.com/rate-limit" target="_blank" rel="noopener">AI Studio Rate Limits</a>. Diese Kennzahlen zeigen zumindest, wie stark diese App gerade sendet.</div></div></div>' +
    '<div class="metric-grid">' +
      dashMetric(lastHour.length, 'Anfragen') +
      dashMetric(sumTokens(lastHour).toLocaleString('de-DE'), 'Token') +

  var byModel = {};

    return '<div class="cost-row"><span><strong>' + esc(x.operation || 'KI-Lauf') + '</strong>' + statusPill + '<br>' +

function personDashboardModel(p) {
  var pe = personEntries(p);
  var c = { A:0, Z:0, F:0, S:0, total:pe.length, direct:0, strong:0, unchecked:0, notes:0 };
  pe.forEach(function(x) {
    if (x.kategorie === 'Anekdote') c.A++;
    else if (x.kategorie === 'Zitat') c.Z++;
    else if (x.kategorie === 'Fakt') c.F++;
    else if (x.kategorie === 'Stil') c.S++;
    if (x.buch === 'direkt') c.direct++;
    if (strength(x) >= 4) c.strong++;
    if (entryUnchecked(x)) c.unchecked++;
    if (hasText(x.buchnotiz)) c.notes++;
  });
  var r = personReadiness(p);
  var gaps = [];
  if (!r.hasThesis) gaps.push('These');
  if (!r.hasPrinciple) gaps.push('Prinzip');
  if (!r.hasStrong) gaps.push('Stärke');
  if (!r.hasFormat) gaps.push('Format');
  if (!r.sourceOk) gaps.push('Quelle');
  return {
    person: p,
    counts: c,
    readiness: r,
    gaps: gaps
  };
}
